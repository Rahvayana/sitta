<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SITTA Bahan Ajar</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body[data-page="login"] .login-panel {
      border-top: 4px solid var(--primary);
    }
  </style>
  <!-- inline > internal > eksternal-->
</head>
<body data-page="login">
  <main class="login-shell" style="--page-accent: #0f766e;">
    <section class="login-panel" aria-labelledby="login-title">
      <div class="brand-lockup">
        <div class="brand-mark" aria-hidden="true">UT</div>
        <div>
          <p class="brand-text">Universitas Terbuka</p>
          <p class="brand-title">SITTA Bahan Ajar</p>
        </div>
      </div>

      <div>
        <h1 id="login-title">Masuk ke Sistem Pemesanan Bahan Ajar</h1>
        <p class="login-copy">Portal UT-Daerah untuk melihat stok, melacak Delivery Order, dan memantau transaksi bahan ajar.</p>
      </div>

      <form id="login-form" class="auth-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="nama@ut.ac.id" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Password" required>
        </div>
        <button class="btn" type="submit">Login</button>
      </form>

      <div class="auth-links" aria-label="Aksi akun">
        <button id="forgot-button" class="link-button" type="button">Lupa Password</button>
        <button id="register-button" class="link-button" type="button">Daftar</button>
      </div>
    </section>

    <aside class="login-visual" aria-label="Ringkasan bahan ajar">
      <div id="cover-preview" class="inventory-board">
        <article class="board-row">
          <img class="cover-stack" src="img/img/pengantar_komunikasi.jpg" alt="Cover Pengantar Ilmu Komunikasi">
          <div>
            <h2>Pengantar Ilmu Komunikasi</h2>
            <p>ASIP4301 - Edisi 2</p>
          </div>
          <span class="badge">548 stok</span>
        </article>
        <article class="board-row">
          <img class="cover-stack" src="img/img/manajemen_keuangan.jpg" alt="Cover Manajemen Keuangan">
          <div>
            <h2>Manajemen Keuangan</h2>
            <p>EKMA4216 - Edisi 3</p>
          </div>
          <span class="badge">392 stok</span>
        </article>
      </div>
    </aside>
  </main>

  <dialog id="app-modal" class="modal" aria-labelledby="modal-title">
    <div class="modal-header">
      <h2 id="modal-title" class="modal-title">Modal</h2>
      <button class="modal-close" type="button" aria-label="Tutup">X</button>
    </div>
    <div class="modal-body"></div>
  </dialog>
  <div id="toast" class="toast" role="alert"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
